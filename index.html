<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mainsches</title>
  <meta name="description" content="Mainsches entwickelt minimalistische, nützliche Apps und digitale Tools." />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    header {
      padding: 20px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    p {
      color: #aaa;
      line-height: 1.6;
    }

    .card {
      border: 1px solid #222;
      padding: 20px;
      margin-top: 20px;
      border-radius: 12px;
    }

    footer {
      border-top: 1px solid #222;
      padding: 20px;
      text-align: center;
      color: #777;
      font-size: 14px;
    }

    footer a {
      margin-left: 10px;
      color: #aaa;
    }

    footer a:hover {
      color: #fff;
    }
  </style>
</head>
<body>

<header>
  <div><strong>Mainsches</strong></div>
  <div>
    <a href="#apps">Apps</a>
  </div>
</header>

<div class="container">
  <h1>Minimal apps. Clear purpose.</h1>
  <p>
    Mainsches builds focused digital products with a clean interface and a practical goal.
  </p>

  <div id="apps" class="card">
    <h2>SwipeSort</h2>
    <p>Photo cleanup app – swipe to delete or keep.</p>
  </div>

  <div class="card">
    <h2>sketchIT</h2>
    <p>Turn sketches into usable digital outputs.</p>
  </div>
</div>

<footer>
  © <span id="year"></span> Mainsches
  <a href="/impressum.html">Kontakt</a>
</footer>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
