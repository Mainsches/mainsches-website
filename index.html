  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0b0b0b;
      color: #fff;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 80px 20px;
    }

    .hero {
      font-size: 52px;
      font-weight: 700;
      line-height: 1.1;
    }

    .sub {
      margin-top: 20px;
      opacity: 0.7;
      font-size: 18px;
      max-width: 600px;
    }

    .section {
      margin-top: 100px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h2 {
      margin: 0 0 10px 0;
    }

    .footer {
      margin-top: 120px;
      opacity: 0.5;
      font-size: 14px;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hero {
        font-size: 38px;
      }
    }
  </style>
</head>
