<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mainsches</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #111, #000);
      color: #fff;
    }

    .container {
      width: min(1100px, 90%);
      margin: auto;
    }

    /* NAVBAR */

    .navbar {
      position: sticky;
      top: 0;
      backdrop-filter: blur(10px);
      background: rgba(0,0,0,0.7);
      border-bottom: 1px solid #1a1a1a;
      z-index: 100;
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 70px;
    }

    .nav-links {
      display: flex;
      gap: 10px;
    }

    .nav-links a {
      width: 90px;
      text-align: center;
      color: #aaa;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #fff;
    }

    /* HERO */

    .hero {
      padding: 120px 0;
      text-align: center;
    }

    .hero h1 {
      font-size: 52px;
      letter-spacing: -1px;
      margin-bottom: 16px;
    }

    .hero p {
      color: #aaa;
      font-size: 18px;
      max-width: 500px;
      margin: auto;
    }

    /* GRID */

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 60px;
    }

    .card {
      padding: 30px;
      border-radius: 20px;
      border: 1px solid #1a1a1a;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      transition: 0.25s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #333;
    }

    .card h3 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .card p {
      color: #888;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="container nav-inner">
      <img src="assets/logo.png" height="28"/>

      <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="contact.html">Contact</a>
        <a href="sketchit.html">sketchIT</a>
        <a href="swipesort.html">SwipeSort</a>
      </div>
    </div>
  </div>

  <!-- HERO -->
  <div class="container hero">
    <h1>AI. Apps. Simplicity.</h1>
    <p>Building focused tools with clean interfaces and real purpose.</p>

    <!-- PRODUCTS -->
    <div class="grid">
      <div class="card" onclick="location.href='swipesort.html'">
        <h3>SwipeSort</h3>
        <p>Fast, minimal photo sorting.</p>
      </div>

      <div class="card" onclick="location.href='sketchit.html'">
        <h3>sketchIT</h3>
        <p>Turn sketches into visuals with AI.</p>
      </div>
    </div>
  </div>

</body>
</html>
