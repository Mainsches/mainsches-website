<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mainsches</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 30px;
      border-bottom: 1px solid #111;
    }

    .logo {
      font-weight: 700;
      letter-spacing: 1px;
    }

    .hero {
      padding: 80px 0;
    }

    .hero h1 {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 20px;
    }

    .hero p {
      color: #aaa;
      font-size: 18px;
      max-width: 600px;
    }

    .apps {
      margin-top: 60px;
    }

    .app {
      border: 1px solid #111;
      padding: 25px;
      border-radius: 16px;
      margin-bottom: 20px;
      transition: 0.2s;
    }

    .app:hover {
      border-color: #333;
      transform: translateY(-2px);
    }

    .app h2 {
      margin: 0 0 10px 0;
    }

    .app p {
      color: #aaa;
    }

    footer {
      border-top: 1px solid #111;
      margin-top: 80px;
      padding-top: 20px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #777;
    }

    footer a {
      color: #aaa;
    }

    footer a:hover {
      color: #fff;
    }
  </style>
</head>

<body>

<div class="container">

  <header>
    <div class="logo">Mainsches</div>
  </header>

  <section class="hero">
    <h1>Build simple.<br>Make it useful.</h1>
    <p>
      Mainsches creates minimal apps focused on clarity, speed and real utility.
      No noise. Just function.
    </p>
  </section>

  <section class="apps">

    <div class="app">
      <h2>SwipeSort</h2>
      <p>Clean your photos fast. Swipe left to delete, right to keep.</p>
    </div>

    <div class="app">
      <h2>sketchIT</h2>
      <p>Turn sketches into usable digital outputs.</p>
    </div>

  </section>

  <footer>
    <div>© <span id="year"></span> Mainsches</div>
    <div>
      <a href="/impressum.html">Kontakt</a>
    </div>
  </footer>

</div>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
