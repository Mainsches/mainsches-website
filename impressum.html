<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt – Mainsches</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />

  <meta
    name="description"
    content="Kontaktseite von Mainsches."
  />

  <style>
    :root {
      --bg: #000000;
      --panel: #0a0a0a;
      --line: #1a1a1a;
      --line-strong: #2a2a2a;
      --text: #ffffff;
      --muted: #aaaaaa;
      --muted-2: #7c7c7c;
      --radius: 24px;
      --max: 900px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top, #111111 0%, #000000 55%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
      padding: 36px 0 60px;
    }

    .top-link {
      display: inline-flex;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .top-link:hover {
      color: var(--text);
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.01));
    }

    .tag {
      display: inline-flex;
      margin-bottom: 14px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      color: var(--muted);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    h1, h2, p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.05em;
      margin-bottom: 12px;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
    }

    .contacts {
      margin-top: 24px;
      display: grid;
      gap: 12px;
    }

    .contact-item {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px 18px;
      background: rgba(255,255,255,0.01);
    }

    .contact-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
      color: var(--text);
    }

    .contact-item a {
      color: var(--muted);
      word-break: break-word;
    }

    .contact-item a:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="top-link">← Zurück zu Mainsches</a>

    <div class="card">
      <span class="tag">Kontakt</span>
      <h1>Mainsches</h1>
      <p>
        Für Fragen zu Projekten, Apps oder allgemeinen Themen kannst du uns per E-Mail erreichen.
      </p>

      <div class="contacts">
        <div class="contact-item">
          <strong>General</strong>
          <a href="mailto:hello@mainsches.com">hello@mainsches.com</a>
        </div>

        <div class="contact-item">
          <strong>Support</strong>
          <a href="mailto:support@mainsches.com">support@mainsches.com</a>
        </div>

        <div class="contact-item">
          <strong>Info</strong>
          <a href="mailto:info@mainsches.com">info@mainsches.com</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
