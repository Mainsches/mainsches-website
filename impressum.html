<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt – Mainsches</title>
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Inter, system-ui, sans-serif;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    a {
      color: #fff;
      text-decoration: none;
    }

    .top-link {
      display: inline-block;
      margin-bottom: 30px;
      color: #aaa;
    }

    .top-link:hover {
      color: #fff;
    }

    h1 {
      margin-top: 0;
      font-size: 42px;
      letter-spacing: -1px;
    }

    p {
      color: #aaa;
      line-height: 1.6;
      font-size: 16px;
    }

    .card {
      border: 1px solid #1a1a1a;
      border-radius: 20px;
      padding: 24px;
      background: #0a0a0a;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="top-link">← Zurück zu Mainsches</a>

    <div class="card">
      <h1>Kontakt</h1>
      <p>E-Mail: hello@mainsches.com</p>
    </div>
  </div>
</body>
</html>
