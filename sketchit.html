<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sketchIT – Mainsches</title>
<link rel="icon" href="/assets/logo.png">

<style>
:root {
  --bg:#000;
  --card:#0a0a0a;
  --line:#1a1a1a;
  --text:#fff;
  --muted:#aaa;
  --max:1100px;
}

*{box-sizing:border-box}

body {
  margin:0;
  font-family: Inter, system-ui;
  background: radial-gradient(circle at top,#111,#000);
  color:var(--text);
}

.container {
  width:min(100% - 32px, var(--max));
  margin:auto;
}

.topbar {
  position:sticky;
  top:0;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.7);
  border-bottom:1px solid var(--line);
}

.topbar-inner {
  display:flex;
  justify-content:space-between;
  align-items:center;
  height:70px;
}

.nav {
  display:flex;
  gap:8px;
}

.nav a {
  width:90px;
  text-align:center;
  color:var(--muted);
  text-decoration:none;
}

.nav a.active {
  color:#fff;
}

.hero {
  padding:80px 0;
}

h1 {
  font-size:48px;
  margin-bottom:10px;
}

.card {
  border:1px solid var(--line);
  padding:20px;
  border-radius:20px;
  margin-top:20px;
}

</style>
</head>

<body>

<header class="topbar">
  <div class="container topbar-inner">
    <div><img src="/assets/logo.png" height="30"></div>

    <nav class="nav">
      <a href="/" >Home</a>
      <a href="/contact.html" >Contact</a>
      <a href="/sketchit.html" class='active'>sketchIT</a>
      <a href="/swipesort.html" >SwipeSort</a>
    </nav>
  </div>
</header>

<div class="container hero">
<h1>sketchIT</h1>
<p style="color:#aaa">Clean UI, stable navbar, modern startup style.</p>

<div class="card">
<p>Content section placeholder – here comes your real content.</p>
</div>

</div>

</body>
</html>
