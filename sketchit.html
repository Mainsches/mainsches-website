<!DOCTYPE html>
<html>
<head>
<title>sketchIT</title>

<style>
:root {
  --bg:#000;
  --card:#0a0a0a;
  --line:#1a1a1a;
  --text:#fff;
  --muted:#aaa;
  --max:1100px;
}

*{box-sizing:border-box}

body {
  margin:0;
  font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
  background: radial-gradient(circle at top,#111,#000);
  color:var(--text);
}

.container {
  width:min(100% - 32px, var(--max));
  margin:auto;
}

.topbar {
  position:sticky;
  top:0;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.7);
  border-bottom:1px solid var(--line);
}

.topbar-inner {
  display:flex;
  justify-content:space-between;
  align-items:center;
  height:70px;
}

.nav {
  display:flex;
  gap:8px;
}

.nav a {
  width:90px;
  text-align:center;
  color:var(--muted);
  text-decoration:none;
  font-weight:500;
}

.nav a.active,
.nav a:hover {
  color:#fff;
}

.hero {
  padding:100px 0;
}

h1 {
  font-size:48px;
  margin-bottom:10px;
  letter-spacing:-1px;
}

p {
  color:var(--muted);
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:40px;
}

.card {
  border:1px solid var(--line);
  padding:24px;
  border-radius:20px;
  background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01));
  transition:0.2s;
}

.card:hover {
  transform:translateY(-4px);
  border-color:#333;
}

input,textarea {
  width:100%;
  padding:14px;
  background:#111;
  border:1px solid #222;
  color:#fff;
  border-radius:12px;
}

button {
  padding:14px 20px;
  border-radius:20px;
  background:#fff;
  color:#000;
  border:none;
  margin-top:10px;
  cursor:pointer;
}

</style>

</head>
<body>

<header class="topbar">
<div class="container topbar-inner">
<img src="/assets/logo.png" height="30">
<nav class="nav">
<a href="/" >Home</a>
<a href="/contact.html" >Contact</a>
<a href="/sketchit.html" class="active">sketchIT</a>
<a href="/swipesort.html" >SwipeSort</a>
</nav>
</div>
</header>

<div class="container hero">
<h1>sketchIT</h1>
<p>Product page</p>
</div>
</body>
</html>
