<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Mainsches</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 600px;
      margin: 60px auto;
      padding: 20px;
    }

    a {
      color: #aaa;
      text-decoration: none;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      margin-bottom: 30px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      background: #111;
      border: 1px solid #333;
      color: #fff;
      border-radius: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 999px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      display: none;
    }

    .success {
      background: #1a3d1a;
    }

    .error {
      background: #3d1a1a;
    }
  </style>
</head>

<body>
  <div class="container">

    <a href="/">← Back</a>

    <h1>Contact</h1>
    <p>Send a message for support or development inquiries.</p>

    <form id="contact-form">

      <!-- Honeypot -->
      <div style="display:none;">
        <input name="company">
        <input name="website">
      </div>

      <input type="hidden" name="formStartedAt" id="formStartedAt">

      <input name="name" placeholder="Name" required>
      <input name="email" placeholder="Email" required>
      <input name="subject" placeholder="Subject" required>
      <textarea name="message" placeholder="Message" required></textarea>

      <button id="submit-btn">Send message</button>

      <div id="status" class="status"></div>

    </form>

  </div>

  <script>
    const form = document.getElementById("contact-form");
    const statusBox = document.getElementById("status");
    const btn = document.getElementById("submit-btn");

    document.getElementById("formStartedAt").value = Date.now();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      statusBox.style.display = "none";
      btn.disabled = true;
      btn.innerText = "Sending...";

      const data = Object.fromEntries(new FormData(form));

      try {
        const res = await fetch("/api/contact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (!res.ok) throw new Error(result.error);

        statusBox.innerText = "Message sent successfully.";
        statusBox.className = "status success";
        statusBox.style.display = "block";

        form.reset();

      } catch (err) {
        statusBox.innerText = err.message || "Error occurred.";
        statusBox.className = "status error";
        statusBox.style.display = "block";
      }

      btn.disabled = false;
      btn.innerText = "Send message";
    });
  </script>

</body>
</html>
