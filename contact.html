<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Mainsches</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />

  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top, #111 0%, #000 60%);
      color: white;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    a {
      color: #aaa;
      text-decoration: none;
    }

    a:hover {
      color: white;
    }

    .card {
      border: 1px solid #1a1a1a;
      border-radius: 24px;
      padding: 30px;
      background: rgba(255,255,255,0.02);
    }

    .tag {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 32px;
    }

    p {
      color: #aaa;
      line-height: 1.6;
    }

    .form {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input, textarea {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #1a1a1a;
      background: #050505;
      color: white;
      font-family: inherit;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      margin-top: 10px;
      padding: 14px;
      border-radius: 999px;
      border: none;
      background: white;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .hint {
      font-size: 14px;
      color: #777;
      margin-top: 10px;
    }

    .emails {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .emails a {
      padding: 12px;
      border: 1px solid #1a1a1a;
      border-radius: 12px;
      display: block;
    }

    .top-link {
      display: inline-block;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <div class="container">

    <a href="/" class="top-link">← Back</a>

    <div class="card">
      <div class="tag">Contact</div>
      <h1>Get in touch</h1>
      <p>
        For support, questions or collaborations, send a message or contact us directly.
      </p>

      <!-- FORM -->
      <form class="form" id="contact-form">

        <!-- SPAM PROTECTION -->
        <div style="display:none;">
          <input name="company" type="text" />
        </div>

        <input name="name" type="text" placeholder="Your name" required />
        <input name="email" type="email" placeholder="Your email" required />
        <input name="subject" type="text" placeholder="Subject" required />
        <textarea name="message" placeholder="Your message" required></textarea>

        <button type="submit">Send message</button>

        <p id="form-status" class="hint"></p>
      </form>

      <!-- EMAILS -->
      <div class="emails">
        <a href="mailto:support@mainsches.com">support@mainsches.com</a>
        <a href="mailto:hello@mainsches.com">hello@mainsches.com</a>
        <a href="mailto:info@mainsches.com">info@mainsches.com</a>
      </div>

    </div>
  </div>

  <!-- SCRIPT -->
  <script>
    const form = document.getElementById("contact-form");
    const statusText = document.getElementById("form-status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      statusText.textContent = "Sending...";

      const formData = new FormData(form);

      const payload = {
        name: formData.get("name"),
        email: formData.get("email"),
        subject: formData.get("subject"),
        message: formData.get("message"),
        company: formData.get("company")
      };

      try {
        const response = await fetch("/api/contact", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          statusText.textContent = data.error || "Something went wrong.";
          return;
        }

        statusText.textContent = "Message sent successfully.";
        form.reset();
      } catch (error) {
        statusText.textContent = "Network error. Please try again.";
      }
    });
  </script>

</body>
</html>
