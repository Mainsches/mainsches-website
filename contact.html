<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Inter}
.container{width:min(100% - 32px,1100px);margin:auto}
.topbar{position:sticky;top:0;background:#000;border-bottom:1px solid #222}
.topbar-inner{display:flex;justify-content:space-between;align-items:center;height:70px}

.nav {
  display:flex;
  gap:8px;
}
.nav a{
  width:90px;
  text-align:center;
  color:#aaa;
  text-decoration:none;
}
.nav a.active{color:#fff;}

.hero{padding:80px 0}
.card{border:1px solid #222;padding:20px;border-radius:20px;margin-top:20px}
input,textarea{width:100%;padding:12px;background:#111;border:1px solid #222;color:#fff;border-radius:10px}
button{padding:12px 20px;border-radius:20px;background:#fff;color:#000;border:none;margin-top:10px;cursor:pointer}
</style>

</head>
<body>

<header class="topbar">
<div class="container topbar-inner">
<img src="/assets/logo.png" height="30">
<nav class="nav">
<a href="/" >Home</a>
<a href="/contact.html" class="active">Contact</a>
<a href="/sketchit.html" >sketchIT</a>
<a href="/swipesort.html" >SwipeSort</a>
</nav>
</div>
</header>

<div class="container hero">
<h1>Contact</h1>

<form id="form">
<input placeholder="Name" name="name" required>
<input placeholder="Email" name="email" required>
<textarea placeholder="Message" name="message" required></textarea>
<button>Send</button>
</form>

<div id="status"></div>

</div>

<script>
document.getElementById("form").addEventListener("submit", async function(e){
e.preventDefault();

const data = Object.fromEntries(new FormData(e.target));

const res = await fetch("/api/contact", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

const result = await res.json();
document.getElementById("status").innerText = result.success ? "Sent!" : "Error";
});
</script>

</body>
</html>
