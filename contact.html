<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Mainsches</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />

  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top, #111 0%, #000 60%);
      color: white;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    a {
      color: #aaa;
      text-decoration: none;
    }

    a:hover {
      color: white;
    }

    .card {
      border: 1px solid #1a1a1a;
      border-radius: 24px;
      padding: 30px;
      background: rgba(255,255,255,0.02);
    }

    .tag {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 32px;
    }

    p {
      color: #aaa;
      line-height: 1.6;
    }

    .emails {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .emails a {
      padding: 12px;
      border: 1px solid #1a1a1a;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/">← Back</a>

    <div class="card">
      <div class="tag">Contact</div>
      <h1>Get in touch</h1>
      <p>
        For support, questions or collaborations, reach out via email.
      </p>

      <div class="emails">
        <a href="mailto:hello@mainsches.com">hello@mainsches.com</a>
        <a href="mailto:support@mainsches.com">support@mainsches.com</a>
        <a href="mailto:info@mainsches.com">info@mainsches.com</a>
      </div>
    </div>
  </div>
</body>
</html>
